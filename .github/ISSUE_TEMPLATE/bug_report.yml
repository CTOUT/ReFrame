name: Bug Report
description: Report a problem with ReFrame
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you provide, the faster it can be fixed.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of ReFrame is affected?
      options:
        - System scan / hardware detection
        - Config file discovery
        - Config analysis / recommendations
        - Registry analysis or changes
        - Backup / rollback
        - Installer (install.ps1)
        - Knowledge base (game or engine profile)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Copilot Chat and invoke @ReFrame
        2. Type '...'
        3. ...
    validations:
      required: true

  - type: textarea
    id: system
    attributes:
      label: System information
      description: Paste the output of `scan system` if relevant, or fill in manually.
      placeholder: |
        OS: Windows 11 Pro
        GPU:
        ReFrame install type: repo-level / user-level
        VS Code version:
        GitHub Copilot Chat version:
        ReFrame version / git ref:

  - type: textarea
    id: agent-output
    attributes:
      label: Agent output
      description: Paste the relevant part of the Copilot Chat conversation.
      render: markdown

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am on the latest version (`git pull` in the ReFrame folder, or reinstall)
          required: true
